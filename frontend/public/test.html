<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e5e7eb; }
        h1 { color: #3b82f6; }
        .section { background: #16162a; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>Simple API Test</h1>

    <div class="section">
        <h2>Test 1: Direct fetch to backend</h2>
        <div id="test1">Loading...</div>
    </div>

    <div class="section">
        <h2>Test 2: Fetch through proxy</h2>
        <div id="test2">Loading...</div>
    </div>

    <div class="section">
        <h2>Test 3: Axios CDN (no interceptor)</h2>
        <div id="test3">Loading...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Test 1: Direct to backend
        fetch('http://localhost:8000/api/api-data/stock/list')
            .then(res => res.json())
            .then(data => {
                document.getElementById('test1').innerHTML = `
                    <p class="success">✓ Success</p>
                    <p>Data count: ${data.data?.length || 0}</p>
                    <p>First: ${data.data?.[0]?.symbol || 'N/A'}</p>
                `;
            })
            .catch(err => {
                document.getElementById('test1').innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            });

        // Test 2: Through proxy
        fetch('/api/api-data/stock/list')
            .then(res => res.json())
            .then(data => {
                document.getElementById('test2').innerHTML = `
                    <p class="success">✓ Success</p>
                    <p>Data count: ${data.data?.length || 0}</p>
                    <p>First: ${data.data?.[0]?.symbol || 'N/A'}</p>
                `;
            })
            .catch(err => {
                document.getElementById('test2').innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            });

        // Test 3: Axios CDN
        axios.get('/api/api-data/stock/list')
            .then(response => {
                const data = response.data;
                document.getElementById('test3').innerHTML = `
                    <p class="success">✓ Success</p>
                    <p>Has success field: ${'success' in data}</p>
                    <p>Success value: ${data.success}</p>
                    <p>Data count: ${data.data?.length || 0}</p>
                    <p>First: ${data.data?.[0]?.symbol || 'N/A'}</p>
                `;
            })
            .catch(err => {
                document.getElementById('test3').innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            });
    </script>
</body>
</html>
